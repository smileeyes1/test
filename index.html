<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مغامرة البطل – جدول ٤ (نسخة PRO)</title>

<style>
body {
  margin: 0;
  font-family: "Cairo", sans-serif;
  background: linear-gradient(#0d1b2a, #1b263b);
  color: #fff;
  text-align: center;
  overflow-x: hidden;
}

/* ====== عنوان اللعبة ====== */
h1 {
  font-size: 44px;
  margin-top: 20px;
  text-shadow: 0 0 25px #00eaff;
}

/* ====== زر الموسيقى ====== */
.music-btn {
  background: #ffdd00;
  color: #000;
  font-size: 22px;
  padding: 10px 25px;
  border-radius: 15px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

/* ====== البطل ====== */
#hero {
  width: 200px;
  margin: 30px auto 10px auto;
  display: block;
  animation: float 2s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0);}
  50% { transform: translateY(-12px);}
  100% { transform: translateY(0);}
}

/* ====== مستوى اللاعب ====== */
#level-box {
  margin-top: 10px;
  font-size: 26px;
  color: #00eaff;
  text-shadow: 0 0 10px #00eaff;
}

/* ====== الوحش ====== */
#monster-box {
  width: 320px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 20px;
  background: #1f4068;
  box-shadow: 0 0 25px #00eaff;
}

#monster {
  width: 150px;
  margin: auto;
  display: block;
  animation: monsterMove 1.5s infinite ease-in-out;
}

@keyframes monsterMove {
  0% { transform: translateY(0);}
  50% { transform: translateY(10px);}
  100% { transform: translateY(0);}
}

#monster-hp {
  width: 90%;
  height: 25px;
  border-radius: 8px;
  background: #333;
  margin: 10px auto;
  overflow: hidden;
}

#monster-hp-inner {
  width: 100%;
  height: 100%;
  background: #29ff74;
  transition: width 0.5s;
}

/* ====== السؤال ====== */
#question {
  font-size: 32px;
  margin-top: 20px;
  direction: rtl;
}

/* ====== المدخل ====== */
input {
  padding: 12px;
  font-size: 26px;
  width: 200px;
  text-align: center;
  border-radius: 10px;
  border: none;
}

button {
  padding: 15px 35px;
  font-size: 26px;
  background: #00eaff;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  color: #000;
  margin-top: 20px;
}

button:hover {
  background: #72f5ff;
}

/* ====== تأثير الضربة ====== */
#effect {
  font-size: 50px;
  height: 80px;
  margin-top: 20px;
}

/* ====== رسالة الفوز ====== */
.victory {
  font-size: 50px;
  color: gold;
  margin-top: 30px;
  animation: glow 1s infinite;
}

@keyframes glow {
  0%,100% { text-shadow: 0 0 30px gold;}
  50% { text-shadow: 0 0 5px gold;}
}

/* ====== أسماء المدرسة والمعلم في الأسفل ====== */
.footer-bar {
  width: 100%;
  position: fixed;
  bottom: 0;
  right: 0;
  padding: 10px 20px;
  background: rgba(0,0,0,0.35);
  display: flex;
  justify-content: space-between;
  font-size: 18px;
  color: #ffdd88;
}
</style>
</head>

<body>

<h1>⚔️ مغامرة البطل – جدول ٤ ⚔️</h1>

<!-- زر تشغيل الموسيقى -->
<button class="music-btn" onclick="toggleMusic()">🎵 تشغيل / إيقاف الموسيقى</button>

<!-- موسيقى خلفية -->
<audio id="bgMusic" loop>
  https://cdn.pixabay.com/audio/2022/03/15/audio_1a2acda2cf.mp3
</audio>

<!-- أصوات -->
<audio id="hitSound">
  https://cdn.pixabay.com/audio/2022/03/15/audio_4460ec1e0a.mp3
</audio>

<audio id="winSound">
  https://cdn.pixabay.com/audio/2021/09/20/audio_faa1c1e3aa.mp3
</audio>

<!-- ====== البطل ====== -->
https://files.catbox.moe/7muv8m.png

<div id="level-box">مستواك: <span id="level">١</span></div>

<!-- ====== الوحش ====== -->
<div id="monster-box">
  https://files.catbox.moe/b6uq2w.png
  <div id="monster-hp">
    <div id="monster-hp-inner"></div>
  </div>
  <div>طاقة الوحش: <span id="hp">١٠٠</span>%</div>
</div>

<!-- ====== السؤال ====== -->
<div id="question">كم يساوي ٤ × ١ ؟</div>

<input type="number" id="answer" placeholder="اكتب الجواب">
<br>
<button onclick="check()">⚡ هجوم</button>

<div id="effect"></div>
<div id="feedback" style="font-size:28px; margin-top:15px;"></div>
<div id="victory-msg"></div>

<!-- ====== أسفل الصفحة (يمين مدرسة – يسار معلم) ====== -->
<div class="footer-bar">
  <div>مدرسة عاطوف المختلطة</div>
  <div>المعلم محمد وجيه</div>
</div>

<script>
/* ========== بيانات اللعبة ========== */
let monsterHP = 100;
let a = 1;
let level = 1;

/* ====== تشغيل وإيقاف الموسيقى ====== */
const bgMusic = document.getElementById("bgMusic");
let musicPlaying = false;

function toggleMusic() {
  if (!musicPlaying) {
    bgMusic.play();
    musicPlaying = true;
  } else {
    bgMusic.pause();
    musicPlaying = false;
  }
}

/* ====== توليد سؤال جديد ====== */
function newQuestion() {
  a = Math.floor(Math.random() * 5) + 1;
  document.getElementById("question").innerHTML =
    "كم يساوي " + toArabic(a) + " × ٤ ؟";
  document.getElementById("answer").value = "";
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("effect").innerHTML = "";
}

/* ====== أرقام عربية ====== */
function toArabic(n) {
  return n.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
}

/* ====== فحص الإجابة ====== */
function check() {
  const ans = parseInt(document.getElementById("answer").value);
  const correct = a * 4;

  if (ans === correct) {
    attackSuccess();
  } else {
    attackFail();
  }
}

/* ====== نجاح الهجوم ====== */
function attackSuccess() {
  document.getElementById("hitSound").play();

  document.getElementById("feedback").innerHTML = "ضربة ناجحة! ✅";
  document.getElementById("effect").innerHTML = "🔥⚡";

  monsterHP -= 20;
  if (monsterHP < 0) monsterHP = 0;

  document.getElementById("hp").innerHTML = monsterHP;
  document.getElementById("monster-hp-inner").style.width = monsterHP + "%";

  if (monsterHP === 0) {
    victory();
  } else {
    newQuestion();
  }
}

/* ====== فشل الهجوم ====== */
function attackFail() {
  document.getElementById("feedback").innerHTML = "هجومك فشل ❌";
  document.getElementById("effect").innerHTML = "💥";

  monsterHP += 5;
  if (monsterHP > 100) monsterHP = 100;

  document.getElementById("hp").innerHTML = monsterHP;
  document.getElementById("monster-hp-inner").style.width = monsterHP + "%";
}

/* ====== عند الفوز ====== */
function victory() {
  document.getElementById("winSound").play();
  document.getElementById("victory-msg").innerHTML =
    "<div class='victory'>🎉 لقد هزمت الوحش! 🎉</div>";

  level++;
  document.getElementById("level").innerHTML = toArabic(level);

  setTimeout(() => {
    monsterHP = 100;
    document.getElementById("hp").innerHTML = monsterHP;
    document.getElementById("monster-hp-inner").style.width = "100%";
    document.getElementById("victory-msg").innerHTML = "";
    newQuestion();
  }, 3000);
}

/* ====== بدء اللعبة ====== */
newQuestion();
</script>

</body>
</html>
