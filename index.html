<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مغامرة البطل – جدول ٤</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#0a1a2f, #112d4e);
  color: #fff;
  text-align: center;
}

/* إطار اللعبة */
#game-container {
  width: 480px;
  margin: 30px auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  box-shadow: 0 0 25px #00eaff;
}

/* شاشة البداية */
#start-screen {
  position: fixed;
  inset: 0;
  background: linear-gradient(#062241, #0a1a2f);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#start-screen h1 {
  font-size: 55px;
  margin-bottom: 30px;
  text-shadow: 0 0 20px #00eaff;
}

#start-btn {
  padding: 18px 45px;
  font-size: 30px;
  border: none;
  border-radius: 15px;
  background: #00eaff;
  color: #000;
  cursor: pointer;
}

/* ====== البطل ====== */
#hero {
  width: 160px;
  height: 230px;
  margin: 20px auto;
  position: relative;
  animation: hero-float 2.2s infinite;
}

#hero .head {
  width: 75px;
  height: 75px;
  background: #ffddb0;
  border-radius: 50%;
  margin: auto;
  border: 5px solid #c79a53;
}

#hero .helmet {
  width: 90px;
  height: 55px;
  background: #444;
  border-radius: 50% 50% 20% 20%;
  position: absolute;
  top: -10px;
  left: 35px;
  border: 4px solid #222;
}

#hero .helmet::after {
  content: "";
  width: 22px;
  height: 45px;
  background: red;
  position: absolute;
  top: -45px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 10px;
}

#hero .body {
  width: 60px;
  height: 110px;
  background: #1976ff;
  margin: auto;
  margin-top: -5px;
  border-radius: 12px;
  border: 5px solid #0a3a74;
}

#hero .armor {
  width: 55px;
  height: 65px;
  background: #d4d4d4;
  margin: auto;
  margin-top: -95px;
  border-radius: 10px;
  border: 4px solid #aaa;
}

#hero .sword {
  width: 14px;
  height: 110px;
  background: silver;
  position: absolute;
  right: -30px;
  top: 60px;
  border-radius: 7px;
  border: 2px solid #ccc;
}

@keyframes hero-float {
  0% { transform: translateY(0);}
  50% { transform: translateY(-10px);}
  100% { transform: translateY(0);}
}

/* ====== الوحش ====== */
#monster-box {
  background: #1f4068;
  padding: 20px;
  margin-top: 15px;
  border-radius: 20px;
  box-shadow: 0 0 15px #00eaff;
}

#monster {
  font-size: 110px;
  transition: 0.2s;
}

.monster-hit {
  animation: monster-shake 0.3s;
}

@keyframes monster-shake {
  0% { transform: translateX(0);}
  25% { transform: translateX(-10px);}
  50% { transform: translateX(10px);}
  75% { transform: translateX(-10px);}
  100% { transform: translateX(0);}
}

/* شريط الطاقة */
#monster-hp {
  width: 90%;
  height: 25px;
  background: #333;
  margin: 10px auto;
  border-radius: 10px;
  overflow: hidden;
}

#monster-hp-inner {
  width: 100%;
  height: 100%;
  background: #29ff74;
  transition: 0.4s;
}

input {
  padding: 12px;
  font-size: 26px;
  border: none;
  border-radius: 10px;
  width: 200px;
  text-align: center;
}

button {
  padding: 15px 35px;
  font-size: 28px;
  margin-top: 15px;
  background: #00eaff;
  border: none;
  border-radius: 15px;
  cursor: pointer;
}

#footer {
  margin-top: 25px;
  font-size: 20px;
  color: #90e0ef;
}
</style>
</head>

<body>

<!-- شاشة البداية -->
<div id="start-screen">
  <h1>⚔️ مغامرة البطل ⚔️</h1>
  <button id="start-btn">ابدأ اللعب</button>
</div>

<div id="game-container">

<!-- البطل -->
<div id="hero">
  <div class="head"></div>
  <div class="helmet"></div>
  <div class="body"></div>
  <div class="armor"></div>
  <div class="sword"></div>
</div>

<!-- المستوى -->
<div style="font-size:30px; color:#00eaff;">
  مستواك: <span id="level">١</span>
</div>

<!-- النقاط -->
<div style="font-size:26px; margin-top:10px; color:#00eaff;">
  نقاطك: <span id="score">٠</span>
</div>

<!-- الوحش -->
<div id="monster-box">
  <div id="monster">👹</div>
  <div id="monster-hp"><div id="monster-hp-inner"></div></div>
  <div style="font-size: 22px;">
    طاقة الوحش: <span id="hp">١٠٠</span>%
  </div>
</div>

<!-- السؤال -->
<div id="question" style="font-size:32px; margin-top:20px;">
  كم يساوي ٤ × ١ ؟
</div>

<input type="number" id="answer" placeholder="اكتب الجواب">
<br>
<button onclick="attack()">هجوم ⚡</button>

</div>

<!-- المدرسة -->
<div id="footer">
  👨‍🏫 المعلم: محمد وجيه — 🏫 مدرسة عاطوف المختلطة
</div>

<script>
/* إخفاء شاشة البداية */
document.getElementById("start-btn").onclick = function() {
  document.getElementById("start-screen").style.display = "none";
  newQuestion();
  updateMonster();
};

/* صوت داخلي */
function playSound(freq, type="sine") {
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3);
  osc.stop(ctx.currentTime + 0.3);
}

/* النظام */
let level = 1;
let score = 0;
let a = 1;

/* الوحوش */
const monsters = ["👹","🐲","👾","🦂","🐉","👻","🦁","🐺"];
let currentMonster = 0;

/* طاقة الوحش */
let monsterMaxHP = 100;
let monsterHP = monsterMaxHP;

function updateMonster() {
  currentMonster = (level - 1) % monsters.length;
  document.getElementById("monster").innerHTML = monsters[currentMonster];
  monsterMaxHP = 100 + (level - 1) * 20;
  monsterHP = monsterMaxHP;
  updateHPBar();
}

/* شريط الطاقة */
function updateHPBar() {
  let p = monsterHP / monsterMaxHP * 100;
  document.getElementById("hp").innerHTML = toArabic(Math.round(p));
  document.getElementById("monster-hp-inner").style.width = p + "%";
}

/* تحويل للأرقام العربية */
function toArabic(n) {
  return n.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
}

/* سؤال جديد (١ إلى ١٠ فقط) */
function newQuestion() {
  a = Math.floor(Math.random() * 10) + 1;
  document.getElementById("question").innerHTML =
    "كم يساوي ٤ × " + toArabic(a) + " ؟";
}

/* هجوم */
function attack() {
  let ans = parseInt(document.getElementById("answer").value);
  if (ans === a * 4) successfulHit();
  else failedHit();
}

/* نجاح ✅ */
function successfulHit() {
  playSound(500);
  document.getElementById("monster").classList.add("monster-hit");
  setTimeout(() => {
    document.getElementById("monster").classList.remove("monster-hit");
  }, 300);

  monsterHP -= 20;
  if (monsterHP < 0) monsterHP = 0;

  updateHPBar();
  score += 10;
  updateScore();

  if (monsterHP === 0) winLevel();
  else newQuestion();
}

/* فشل ❌ */
function failedHit() {
  playSound(200);
  monsterHP += 10;
  if (monsterHP > monsterMaxHP) monsterHP = monsterMaxHP;
  updateHPBar();
  score -= 5;
  if (score < 0) score = 0;
  updateScore();
}

/* الفوز بالمستوى */
function winLevel() {
  playSound(800);
  level++;
  document.getElementById("level").innerHTML = toArabic(level);
  updateMonster();
  newQuestion();
}

/* تحديث النقاط */
function updateScore() {
  document.getElementById("score").innerHTML = toArabic(score);
}
</script>

</body>
</html>
