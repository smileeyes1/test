<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مغامرة البطل – جدول ٤</title>

<style>
/* ===========================
   الخلفية العامة
   =========================== */

body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: linear-gradient(#0a1a2f, #112d4e);
  color: #fff;
  text-align: center;
}

/* ===========================
   شاشة البداية
   =========================== */

#start-screen {
  position: fixed;
  inset: 0;
  background: linear-gradient(#062241, #0a1a2f);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#start-screen h1 {
  font-size: 60px;
  margin-bottom: 40px;
  text-shadow: 0 0 20px #00eaff;
}

#start-btn {
  padding: 20px 50px;
  font-size: 32px;
  border: none;
  border-radius: 15px;
  background: #00eaff;
  color: #000;
  cursor: pointer;
}

#start-btn:hover {
  background: #72f5ff;
}

/* زر الخروج من ملء الشاشة */
#exit-fullscreen {
  position: fixed;
  top: 15px;
  left: 15px;
  background: rgba(0,0,0,0.5);
  color: #fff;
  padding: 10px 20px;
  font-size: 22px;
  border-radius: 10px;
  cursor: pointer;
  display: none;
  z-index: 9999;
}

/* ===========================
   البطل (CSS Warrior)
   =========================== */

#hero {
  width: 160px;
  height: 230px;
  margin: 30px auto;
  position: relative;
  animation: hero-float 2.2s infinite ease-in-out;
  transform-origin: center;
}

/* الرأس */
#hero .head {
  width: 75px;
  height: 75px;
  background: #ffddb0;
  border-radius: 50%;
  border: 5px solid #c79a53;
  margin: auto;
  position: relative;
  z-index: 3;
}

/* الخوذة */
#hero .helmet {
  width: 90px;
  height: 55px;
  background: #444;
  border-radius: 50% 50% 20% 20%;
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  border: 4px solid #222;
  z-index: 4;
}

#hero .helmet::after {
  content: "";
  width: 22px;
  height: 45px;
  background: red;
  position: absolute;
  top: -45px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 10px;
  box-shadow: 0 0 10px red;
}

/* الجسم */
#hero .body {
  width: 60px;
  height: 110px;
  background: #1976ff;
  margin: auto;
  margin-top: -5px;
  border-radius: 12px;
  border: 5px solid #0a3a74;
  z-index: 2;
}

/* الدرع */
#hero .armor {
  width: 55px;
  height: 65px;
  background: #d4d4d4;
  margin: auto;
  margin-top: -95px;
  border-radius: 10px;
  border: 4px solid #aaa;
  box-shadow: 0 0 15px #fff inset;
  z-index: 5;
}

/* السيف */
#hero .sword {
  width: 14px;
  height: 110px;
  background: silver;
  position: absolute;
  right: -30px;
  top: 60px;
  border-radius: 7px;
  border: 2px solid #ccc;
  box-shadow: 0 0 12px #fff;
  transform-origin: bottom center;
}

#hero .sword::after {
  content: "";
  width: 26px;
  height: 14px;
  background: #b8860b;
  position: absolute;
  bottom: -12px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 4px;
}

/* حركة عائمة */
@keyframes hero-float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0); }
}

/* حركة هجوم */
.hero-attack {
  animation: hero-attack-anim 0.25s ease-out;
}

@keyframes hero-attack-anim {
  0% { transform: translateY(-10px) rotate(-6deg) scale(1.05); }
  100% { transform: translateY(0) rotate(0deg) scale(1); }
}

/* ===========================
   الوحوش + شريط الطاقة
   =========================== */

#monster-box {
  width: 320px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 20px;
  background: #1f4068;
  box-shadow: 0 0 20px #00eaff;
}

#monster {
  font-size: 120px;
  margin-bottom: 10px;
  transition: transform 0.2s;
}

.monster-hit {
  animation: monster-shake 0.3s ease-in-out;
}

@keyframes monster-shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-15px); }
  40% { transform: translateX(15px); }
  60% { transform: translateX(-15px); }
  80% { transform: translateX(15px); }
  100% { transform: translateX(0); }
}

#monster-hp {
  width: 90%;
  height: 30px;
  background: #333;
  border-radius: 10px;
  margin: 10px auto;
  overflow: hidden;
}

#monster-hp-inner {
  width: 100%;
  height: 100%;
  background: #29ff74;
  transition: width 0.5s;
}

#question {
  font-size: 35px;
  margin-top: 10px;
}

input {
  padding: 15px;
  font-size: 26px;
  width: 220px;
  text-align: center;
  border-radius: 10px;
  border: none;
}

button {
  padding: 18px 40px;
  font-size: 28px;
  margin-top: 15px;
  background: #00eaff;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  color: black;
}

button:hover {
  background: #72f5ff;
}

/* ===========================
   معلومات المدرسة والمعلم
   =========================== */

#footer {
  position: fixed;
  bottom: 10px;
  right: 0;
  left: 0;
  text-align: center;
  font-size: 22px;
  color: #90e0ef;
  text-shadow: 0 0 10px #00eaff;
  z-index: 999;
}
</style>

</head>
<body>

<!-- شاشة البداية -->
<div id="start-screen">
  <h1>⚔️ مغامرة البطل ⚔️</h1>
  <button id="start-btn">ابدأ اللعب</button>
</div>

<!-- زر الخروج من ملء الشاشة -->
<div id="exit-fullscreen">🔙 خروج</div>

<!-- البطل -->
<div id="hero">
  <div class="head"></div>
  <div class="helmet"></div>
  <div class="body"></div>
  <div class="armor"></div>
  <div class="sword"></div>
</div>

<!-- المستوى -->
<div id="level-box" style="font-size:30px; color:#00eaff;">
  مستواك: <span id="level">١</span>
</div>

<!-- النقاط -->
<div id="score-box" style="font-size:26px; color:#00eaff; margin-top:10px;">
  نقاطك: <span id="score">٠</span>
</div>

<!-- الوحش -->
<div id="monster-box">
  <div id="monster">👹</div>
  <div id="monster-hp">
      <div id="monster-hp-inner"></div>
  </div>
  <div style="font-size: 24px;">
    طاقة الوحش: <span id="hp">١٠٠</span>%
  </div>
</div>

<!-- السؤال -->
<div id="question">كم يساوي ٤ × ١ ؟</div>

<input type="number" id="answer" placeholder="اكتب الجواب">

<br>
<button onclick="attack()">هجوم ⚡</button>

<!-- معلومات المدرسة -->
<div id="footer">
  👨‍🏫 المعلم: محمد وجيه — 🏫 مدرسة عاطوف المختلطة
</div>

<script>
/* ===========================
   شاشة البداية + ملء الشاشة
   =========================== */

document.getElementById("start-btn").onclick = async function () {
  const body = document.documentElement;

  if (body.requestFullscreen) body.requestFullscreen();
  else if (body.webkitRequestFullscreen) body.webkitRequestFullscreen();

  document.getElementById("exit-fullscreen").style.display = "block";
  document.getElementById("start-screen").style.display = "none";

  newQuestion();
  updateScore();
  updateMonster();
};

document.getElementById("exit-fullscreen").onclick = function () {
  if (document.exitFullscreen) document.exitFullscreen();
  else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
};

/* ===========================
   الأصوات الداخلية
   =========================== */

function playSound(type) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  if (type === "hit") {
    osc.frequency.value = 480;
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
  }

  else if (type === "fail") {
    osc.frequency.value = 200;
    gain.gain.setValueAtTime(0.6, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
  }

  else if (type === "monsterCry") {
    osc.frequency.value = 90;
    gain.gain.setValueAtTime(0.7, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
    osc.type = "sawtooth";
  }

  else if (type === "levelUp") {
    osc.frequency.value = 700;
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.type = "triangle";
  }

  osc.start();
  osc.stop(ctx.currentTime + 0.5);
}

/* ===========================
   الوحوش + المستويات
   =========================== */

let level = 1;
let monsterMaxHP = 100;
let monsterHP = 100;

/* قائمة الوحوش */
const monsters = ["👹", "🐲", "👾", "🦂", "🐉", "👻", "🦁", "🐺"];
let currentMonsterIndex = 0;

function updateMonster() {
  currentMonsterIndex = (level - 1) % monsters.length;
  document.getElementById("monster").innerHTML = monsters[currentMonsterIndex];

  monsterMaxHP = 100 + (level - 1) * 20;
  monsterHP = monsterMaxHP;

  updateHPBar();
}

/* ===========================
   شريط الطاقة
   =========================== */

function updateHPBar() {
  const hpPercent = (monsterHP / monsterMaxHP) * 100;
  document.getElementById("hp").innerHTML = toArabic(hpPercent.toFixed(0));
  document.getElementById("monster-hp-inner").style.width = hpPercent + "%";
}

function shakeMonster() {
  const m = document.getElementById("monster");
  m.classList.add("monster-hit");
  setTimeout(() => m.classList.remove("monster-hit"), 300);
}

/* ===========================
   الأسئلة والهجوم
   =========================== */

let attackPower = 20;
let score = 0;

function toArabic(n) {
  return n.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
}

let a = 1;

function newQuestion() {
  a = Math.floor(Math.random() * 12) + 1;
  document.getElementById("question").innerHTML =
    "كم يساوي ٤ × " + toArabic(a) + " ؟";
  document.getElementById("answer").value = "";
}

function attack() {
  const ans = parseInt(document.getElementById("answer").value);
  const correct = a * 4;

  if (ans === correct) {
    successfulHit();
  } else {
    failedHit();
  }
}

function successfulHit() {
  playSound("hit");
  playSound("monsterCry");

  const hero = document.getElementById("hero");
  hero.classList.add("hero-attack");
  setTimeout(() => hero.classList.remove("hero-attack"), 250);

  shakeMonster();

  monsterHP -= attackPower;
  if (monsterHP < 0) monsterHP = 0;

  updateHPBar();

  score += 10;
  updateScore();

  if (monsterHP === 0) {
    winLevel();
  } else {
    newQuestion();
  }
}

function failedHit() {
  playSound("fail");

  monsterHP += 10;
  if (monsterHP > monsterMaxHP) monsterHP = monsterMaxHP;

  updateHPBar();

  score -= 5;
  if (score < 0) score = 0;
  updateScore();
}

function winLevel() {
  playSound("levelUp");

  level++;
  document.getElementById("level").innerHTML = toArabic(level);

  attackPower += 5;

  updateMonster();

  newQuestion();
}

function updateScore() {
  document.getElementById("score").innerHTML = toArabic(score);
}
</script>

</body>
</html>
