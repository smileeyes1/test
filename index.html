<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مغامرة البطل – جدول ٤</title>

<style>
body {
  margin: 0;
  font-family: "Arial", sans-serif;
  background: linear-gradient(#0d1b2a, #1b263b);
  color: #fff;
  text-align: center;
  overflow-x: hidden;
}

/* ====== عنوان اللعبة ====== */
h1 {
  font-size: 48px;
  margin-top: 20px;
  text-shadow: 0 0 20px #00eaff;
}

/* ====== شخصية البطل ====== */
#hero {
  width: 180px;
  margin: 20px auto;
  animation: float 2s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0);}
  50% { transform: translateY(-12px);}
  100% { transform: translateY(0);}
}

/* ====== وحش الأرقام ====== */
#monster-box {
  width: 300px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 20px;
  background: #1f4068;
  box-shadow: 0 0 20px #00eaff;
}

#monster {
  font-size: 110px;
}

#monster-hp {
  width: 90%;
  height: 25px;
  border-radius: 8px;
  background: #333;
  margin: 10px auto;
  overflow: hidden;
}

#monster-hp-inner {
  width: 100%;
  height: 100%;
  background: #29ff74;
  transition: width 0.5s;
}

/* ====== سؤال المعركة ====== */
#question {
  font-size: 32px;
  margin-top: 20px;
}

input {
  padding: 12px;
  font-size: 26px;
  width: 200px;
  text-align: center;
  border-radius: 10px;
  border: none;
}

button {
  padding: 15px 35px;
  font-size: 26px;
  background: #00eaff;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  color: #000;
  margin-top: 20px;
}

button:hover {
  background: #72f5ff;
}

/* ====== الضربات الخاصة ====== */
#effect {
  font-size: 50px;
  height: 80px;
  margin-top: 20px;
}

/* ====== مستوى اللاعب ====== */
#level-box {
  margin-top: 25px;
  font-size: 26px;
  color: #00eaff;
  text-shadow: 0 0 10px #00eaff;
}

/* ====== الاحتفال بالفوز ====== */
.victory {
  font-size: 50px;
  color: gold;
  margin-top: 30px;
  animation: glow 1s infinite;
}

@keyframes glow {
  0%,100% { text-shadow: 0 0 30px gold;}
  50% { text-shadow: 0 0 5px gold;}
}
</style>
</head>


<body>

<h1>⚔️ مغامرة البطل – جدول ٤ ⚔️</h1>

<!-- ====== البطل ====== -->
https://i.imgur.com/JmT9B1O.png

<div id="level-box">مستواك: <span id="level">١</span></div>

<!-- ====== الوحش ====== -->
<div id="monster-box">
  <div id="monster">👹</div>
  <div id="monster-hp">
    <div id="monster-hp-inner"></div>
  </div>
  <div>طاقة الوحش: <span id="hp">١٠٠</span>%</div>
</div>

<!-- ====== سؤال القتال ====== -->
<div id="question">كم يساوي ٤ × ١ ؟</div>

<input type="number" id="answer" placeholder="اكتب الجواب">
<br>
<button onclick="check()">هجوم ⚡</button>

<div id="effect"></div>
<div id="feedback" style="font-size:28px; margin-top:15px;"></div>

<div id="victory-msg"></div>


<script>
/* ========== بيانات اللعبة ========== */
let monsterHP = 100;
let a = 1;
let level = 1;

/* ====== توليد سؤال ====== */
function newQuestion() {
  a = Math.floor(Math.random() * 5) + 1;
  document.getElementById("question").innerHTML =
    "كم يساوي " + toArabic(a) + " × ٤ ؟";
  document.getElementById("answer").value = "";
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("effect").innerHTML = "";
}

/* ====== تحويل للأرقام العربية ====== */
function toArabic(n) {
  return n.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
}

/* ====== فحص الإجابة ====== */
function check() {
  const ans = parseInt(document.getElementById("answer").value);
  const correct = a * 4;

  if (ans === correct) {
    attackSuccess();
  } else {
    attackFail();
  }
}

/* ====== نجاح الهجوم ====== */
function attackSuccess() {
  document.getElementById("feedback").innerHTML = "ضربة ناجحة! ✅";
  document.getElementById("effect").innerHTML = "🔥⚡";

  monsterHP -= 20;
  if (monsterHP < 0) monsterHP = 0;

  document.getElementById("hp").innerHTML = monsterHP;
  document.getElementById("monster-hp-inner").style.width = monsterHP + "%";

  if (monsterHP === 0) {
    victory();
  } else {
    newQuestion();
  }
}

/* ====== فشل الهجوم ====== */
function attackFail() {
  document.getElementById("feedback").innerHTML = "هجومك فشل ❌";
  document.getElementById("effect").innerHTML = "💥";

  monsterHP += 5;
  if (monsterHP > 100) monsterHP = 100;

  document.getElementById("hp").innerHTML = monsterHP;
  document.getElementById("monster-hp-inner").style.width = monsterHP + "%";
}

/* ====== عند هزيمة الوحش ====== */
function victory() {
  document.getElementById("victory-msg").innerHTML =
    "<div class='victory'>🎉 لقد هزمت الوحش! 🎉</div>";

  level++;
  document.getElementById("level").innerHTML = toArabic(level);

  setTimeout(() => {
    monsterHP = 100;
    document.getElementById("hp").innerHTML = monsterHP;
    document.getElementById("monster-hp-inner").style.width = monsterHP + "%";
    document.getElementById("victory-msg").innerHTML = "";
    newQuestion();
  }, 3000);
}

/* ====== بدء اللعبة ====== */
newQuestion();
</script>

</body>
</html>
